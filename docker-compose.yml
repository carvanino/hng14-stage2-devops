
networks:
  internal_net:
    driver: bridge

services:
  redis:
    image: redis:alpine
    # NO ports section! should only be accessible internally.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - internal_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  api:
    build: 
      context: ./api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - internal_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  worker:
    build: 
      context: ./worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - internal_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  frontend:
    build: 
      context: ./frontend
    environment:
      - API_HOST=api
      - API_PORT=8000
      - PORT=3000
    # No host port binding — nginx owns the exposed port
    networks:
      - internal_net
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  nginx:
    build:
      context: ./nginx
    ports:
      - "3000:80"
    networks:
      - internal_net
    depends_on:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "64M"
