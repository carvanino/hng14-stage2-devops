version: "3.8"

volumes:
  HNG-nginx-logs:
    driver: local

networks:
  hng-network:
    driver: bridge

services:
  nginx:
    image: nginx:latest
    container_name: hng-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - hng-network
    depends_on:
      - nextcloud

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    restart: unless-stopped
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - hng-network
    expose:
      - "80"

  detector:
    build: ./detector
    container_name: hng-detector
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    pid: host
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - /var/log/detector:/var/log/detector
    environment:
      - PYTHONUNBUFFERED=1
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      - nginx
