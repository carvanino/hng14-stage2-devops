events {}

http {
    # Trust X-Forwarded-For from any upstream
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   0.0.0.0/0;
    real_ip_recursive  on;

    # JSON log format — all required fields
    log_format json_log escape=json
        '{'
            '"source_ip":"$realip_remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time'
        '}';

    # Send logs to the shared volume path
    access_log  /var/log/nginx/hng-access.log  json_log;
    error_log   /var/log/nginx/hng-error.log   warn;

    # Don't expose nginx version
    server_tokens off;

    upstream nextcloud_backend {
        server nextcloud:80;
    }

    server {
        listen 80;
        server_name _;          # accept any hostname/IP

        # Pass real IP to backend
        proxy_set_header  X-Forwarded-For   $realip_remote_addr;
        proxy_set_header  X-Real-IP         $realip_remote_addr;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Larger body for Nextcloud file uploads
        client_max_body_size 10G;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;

        location / {
            proxy_pass http://nextcloud_backend;
        }
    }

    # Dashboard — catches only the subdomain
    server {
        listen 80;
        server_name hng-akinola.duckdns.org;

        location / {
            proxy_pass http://172.17.0.0:8081;
        }
    }
}
