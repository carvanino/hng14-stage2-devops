name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- LINT STAGE ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Lint Python Code
        run: |
          pip install flake8
          flake8 api/main.py worker/worker.py

      - name: Lint JavaScript Code
        run: |
          cd frontend
          npm install
          npx eslint app.js

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "api/Dockerfile"

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "worker/Dockerfile"

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "frontend/Dockerfile"

      - name: Lint Nginx Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "nginx/Dockerfile"

      # --- TEST STAGE ---
      - name: Install Test Dependencies
        run: |
          pip install -r api/requirements.txt

      - name: Run Unit Tests
        env:
          PYTHONPATH: .
        run: |
          pytest --cov=api api/tests/ --cov-report=xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # --- BUILD STAGE ---
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to Local Registry
        run: |
          # Build images with layer caching
          docker buildx build --cache-from=type=local,src=/tmp/.buildx-cache --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max --load -t localhost:5000/api:latest -t localhost:5000/api:${{ github.sha }} ./api
          docker buildx build --cache-from=type=local,src=/tmp/.buildx-cache --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max --load -t localhost:5000/worker:latest -t localhost:5000/worker:${{ github.sha }} ./worker
          docker buildx build --cache-from=type=local,src=/tmp/.buildx-cache --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max --load -t localhost:5000/frontend:latest -t localhost:5000/frontend:${{ github.sha }} ./frontend
          docker buildx build --cache-from=type=local,src=/tmp/.buildx-cache --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max --load -t localhost:5000/nginx:latest -t localhost:5000/nginx:${{ github.sha }} ./nginx

          # Push images to the local registry service we set up above
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/nginx:latest

          # Rotate cache
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # --- SECURITY SCAN STAGE ---
      # Step 1: Generate SARIF reports for the GitHub Security tab (never blocks the pipeline)
      - name: Generate Trivy SARIF (API)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      - name: Generate Trivy SARIF (Worker)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/worker:latest'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      - name: Generate Trivy SARIF (Frontend)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      - name: Generate Trivy SARIF (Nginx)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/nginx:latest'
          format: 'sarif'
          output: 'trivy-nginx.sarif'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      # Step 2: Enforce the gate — table format prints findings to the log, exit-code: 1 blocks on CRITICAL
      - name: Trivy gate (API)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'table'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      - name: Trivy gate (Worker)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/worker:latest'
          format: 'table'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      - name: Trivy gate (Frontend)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/frontend:latest'
          format: 'table'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      - name: Trivy gate (Nginx)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: 'localhost:5000/nginx:latest'
          format: 'table'
          scanners: 'vuln'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_INSECURE: "true"

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: '*.sarif'

      # --- INTEGRATION TEST STAGE ---
      - name: Run Integration Tests
        run: |
          cp .env.example .env
          docker compose up -d
          sleep 20
          chmod +x integration_test.sh
          ./integration_test.sh
          

      - name: Teardown Stack
        if: always() # Ensure we tear down even if tests fail
        run: docker compose down

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Scripted Rolling Update
        run: |
          cp .env.example .env
          docker compose up -d
          
          chmod +x deploy.sh
          ./deploy.sh api
          ./deploy.sh worker
          ./deploy.sh frontend
